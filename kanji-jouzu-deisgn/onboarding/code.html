        /* Subtle Japanese-inspired background pattern (Asanoha variation using pure CSS) */
        .bg-pattern {
            background-color: #fff8f7;
            background-image: 
                radial-gradient(circle at center, rgba(219, 49, 63, 0.03) 0%, transparent 50%),
                linear-gradient(45deg, rgba(228, 190, 188, 0.05) 25%, transparent 25%, transparent 75%, rgba(228, 190, 188, 0.05) 75%, rgba(228, 190, 188, 0.05)), 
                linear-gradient(45deg, rgba(228, 190, 188, 0.05) 25%, transparent 25%, transparent 75%, rgba(228, 190, 188, 0.05) 75%, rgba(228, 190, 188, 0.05));
            background-size: 100vw 100vh, 40px 40px, 40px 40px;
            background-position: center, 0 0, 20px 20px;
        }

        /* Float animation for the central logo */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
